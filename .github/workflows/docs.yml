name: Deploy Docs

on:
  push:
    branches:
      - master
    paths:
      - 'docs-site/**'
      - 'docs/index.html'
      - 'src/lib/**'
      - 'examples/svelte/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Install root dependencies (for building library + demo)
      - name: Install root dependencies
        run: npm install

      # Build the library (needed by demo)
      - name: Build library
        run: npm run package

      # Build Docusaurus docs
      - name: Install docs dependencies
        working-directory: docs-site
        run: npm install

      - name: Build docs
        working-directory: docs-site
        run: npm run build

      - name: Copy docs build to docs/guide
        run: |
          rm -rf docs/guide
          cp -r docs-site/build docs/guide

      # Build Svelte demo
      - name: Build demo
        run: BASE_URL=/p2pass/demo/ npx vite build --config examples/svelte/vite.config.js --outDir ../../docs/demo --emptyOutDir
        env:
          VITE_BOOTSTRAP_PEERS: ${{ secrets.VITE_BOOTSTRAP_PEERS }}

      # Upload docs/ as GitHub Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
