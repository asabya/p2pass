name: E2E Tests

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Uses playwright.config.js reporters on GITHUB_ACTIONS: github + line (do not pass only --reporter=github — it hides per-test lines).
      # Full suite (all e2e projects): npm run test:e2e
      # Temporarily narrowed to core specs only; widget e2e (*.e2e.test.js) and any other spec files are not run.
      - name: Run Playwright E2E suite
        run: npx playwright test e2e/link-devices.spec.js e2e/recovery-worker.spec.js --project=e2e
