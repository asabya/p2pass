name: E2E Tests

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

# One failing matrix job fails the workflow (red). No continue-on-error; Playwright exits non-zero on test failures.
jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        signing_mode: [worker, hardware-ed25519, hardware-p256]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Uses playwright.config.js reporters on GITHUB_ACTIONS: github + line (do not pass only --reporter=github — it hides per-test lines).
      - name: Run Playwright E2E suite
        run: npm run test:e2e
        env:
          CI: true
          E2E_SIGNING_MODE: ${{ matrix.signing_mode }}
          E2E_STORACHA_DELEGATION: ${{ secrets.E2E_STORACHA_DELEGATION }}
