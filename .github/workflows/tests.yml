name: Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        signing_mode: [worker, hardware-ed25519, hardware-p256]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # Full suite: npm run test:e2e
      - name: End-to-end tests
        run: npx playwright test e2e/link-devices.spec.js e2e/recovery-worker.spec.js --project=e2e
        env:
          CI: true
          E2E_SIGNING_MODE: ${{ matrix.signing_mode }}
          # Optional: repo secret so recovery-worker (b) IPNS/Storacha path runs in CI (skipped if unset).
          E2E_STORACHA_DELEGATION: ${{ secrets.E2E_STORACHA_DELEGATION }}
