name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    name: E2E (${{ matrix.signing_mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        signing_mode: [worker, hardware-ed25519, hardware-p256]
    steps:
      - uses: actions/checkout@v4

      - name: Signing mode for this matrix job
        run: echo "E2E_SIGNING_MODE=${{ matrix.signing_mode }}"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Uses playwright.config.js reporters on GITHUB_ACTIONS: github + line (do not pass only --reporter=github — it hides per-test lines).
      - name: Run Playwright E2E suite (${{ matrix.signing_mode }})
        run: npm run test:e2e
        env:
          CI: true
          E2E_SIGNING_MODE: ${{ matrix.signing_mode }}
          E2E_STORACHA_DELEGATION: ${{ secrets.E2E_STORACHA_DELEGATION }}
