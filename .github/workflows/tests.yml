name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    name: E2E (sequential signing modes)
    runs-on: ubuntu-latest
    # Three full Playwright runs (worker + hardware-ed25519 + hardware-p256); avoid matrix parallel load.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E (worker)
        run: npm run test:e2e
        env:
          CI: true
          E2E_SIGNING_MODE: worker
          E2E_STORACHA_DELEGATION: ${{ secrets.E2E_STORACHA_DELEGATION }}

      - name: Run Playwright E2E (hardware-ed25519)
        run: npm run test:e2e
        env:
          CI: true
          E2E_SIGNING_MODE: hardware-ed25519
          E2E_STORACHA_DELEGATION: ${{ secrets.E2E_STORACHA_DELEGATION }}

      - name: Run Playwright E2E (hardware-p256)
        run: npm run test:e2e
        env:
          CI: true
          E2E_SIGNING_MODE: hardware-p256
          E2E_STORACHA_DELEGATION: ${{ secrets.E2E_STORACHA_DELEGATION }}
